name: Bina APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Jana folder platform android
        run: flutter create . --project-name muslim_smart_kids --platforms android

      - name: Pasang pakej
        run: flutter pub get

      - name: Bina APK release
        run: flutter build apk --release

      - name: Muat naik APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
