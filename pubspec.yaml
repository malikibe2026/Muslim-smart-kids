name: muslim_smart_kids
description: Aplikasi pembelajaran Islam & IQ untuk kanak-kanak 1-6 tahun.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  flutter_tts: ^4.0.2
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/audio/rhymes/
    - assets/audio/loops/
    - assets/audio/surah/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#FFE1EC"
  adaptive_icon_foreground: assets/icon/icon_fg.png
